name: CI

on:
  push:
    branches: [staging]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -W error -m compileall -q grok_register_ttk.py cpa_export.py cpa_xai scripts tests
      - run: python -m unittest discover -s tests -v

  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: temp-mail/worker
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: temp-mail/worker/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run build
